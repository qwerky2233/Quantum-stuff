<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post-Fiat Validator Node</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #c9d1d9;
            --accent-color: #58a6ff;
            --success-color: #2ea44f;
            --card-bg: #161b22;
            --border-color: #30363d;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 20px;
            box-sizing: border-box;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 6px;
            padding: 32px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            background-color: rgba(46, 164, 79, 0.15);
            color: var(--success-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 20px;
            border: 1px solid rgba(46, 164, 79, 0.4);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background-color: var(--success-color);
            border-radius: 50%;
            margin-right: 8px;
            animation: pulse 2s infinite;
        }

        h1 {
            font-size: 2rem;
            color: #f0f6fc;
            margin-top: 0;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.5;
            color: #8b949e;
            margin-bottom: 30px;
        }

        .footer {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #484f58;
            border-top: 1px solid var(--border-color);
            padding-top: 20px;
        }

        .footer a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        @keyframes pulse {
            0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 164, 79, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(46, 164, 79, 0); }
            100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(46, 164, 79, 0); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="card">
            <div class="status-badge">
                <span class="status-dot"></span>
                Validator Online
            </div>
            <h1>Post-Fiat Validator</h1>
            <p>Securing the decentralized future. This node is actively validating blocks and upholding network consensus.</p>
            
            <div class="footer">
                Powered by GitHub Actions &bull; View on <a href="https://github.com">GitHub</a>
            </div>
        </div>
    </div>

</body>
</html>
